<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StoryBali Cht</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root { --wa-bg: #0b141a; --wa-surface: #202c33; --wa-primary: #00a884; --wa-text: #e9edef; }
        body { font-family: 'Inter', sans-serif; background-color: var(--wa-bg); color: var(--wa-text); overscroll-behavior: none; }
        .hide { display: none !important; }
        .chat-in { background-color: #202c33; border-radius: 0 12px 12px 12px; align-self: flex-start; }
        .chat-out { background-color: #005c4b; border-radius: 12px 0 12px 12px; align-self: flex-end; }
        
        /* Glassmorphism for Call */
        .call-screen { background: rgba(11, 20, 26, 0.95); backdrop-filter: blur(15px); z-index: 200; }
        #localVideo { width: 100px; height: 150px; position: absolute; top: 20px; right: 20px; border-radius: 15px; object-fit: cover; border: 2px solid var(--wa-primary); z-index: 10; }
        #remoteVideo { width: 100%; height: 100%; object-fit: cover; }

        /* Bottom Nav */
        .nav-active { color: var(--wa-primary); }
        .nav-active i { transform: translateY(-3px); transition: 0.3s; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #374151; border-radius: 10px; }
    </style>
</head>
<body>

    <!-- AUDIO NOTIFIKASI -->
    <audio id="ringtone" loop src="https://assets.mixkit.co/active_storage/sfx/1359/1359-preview.mp3"></audio>
    <audio id="notif-chat" src="https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3"></audio>

    <!-- SCREEN 1: LOGIN -->
    <div id="screen-login" class="fixed inset-0 flex flex-col items-center justify-between p-10 z-[300] bg-[#0b141a]">
        <div class="flex flex-col items-center mt-20">
            <div class="w-24 h-24 bg-[#00a884] rounded-full flex items-center justify-center mb-8 shadow-2xl">
                <i class="fa-solid fa- comment-dots text-white text-5xl"></i>
            </div>
            <h1 class="text-3xl font-black mb-2 tracking-tight text-center">Selamat Datang di <br><span class="text-[#00a884]">StoryBali Cht</span></h1>
            <p class="text-gray-500 text-sm text-center px-4">Pesan pribadi Anda terenkripsi secara P2P. Masukkan nama atau ID unik untuk memulai.</p>
        </div>
        
        <div class="w-full max-w-xs mb-10 flex flex-col gap-4">
            <input id="my-id-input" type="text" placeholder="ID Unik (Contoh: budi_bali)" class="w-full bg-[#202c33] p-5 rounded-2xl border border-white/5 outline-none focus:border-[#00a884] transition-all text-center font-bold text-xl">
            <button onclick="login()" class="w-full bg-[#00a884] p-5 rounded-2xl font-bold shadow-lg active:scale-95 transition">LANJUTKAN</button>
            <p class="text-[10px] text-gray-600 text-center uppercase tracking-widest">Powered by StoryBali</p>
        </div>
    </div>

    <!-- MAIN APP -->
    <div id="main-app" class="h-screen flex flex-col hide">
        <!-- Header -->
        <header class="h-16 flex items-center justify-between px-6 bg-[#202c33] shadow-lg">
            <h2 id="page-title" class="text-xl font-bold text-[#00a884] tracking-tight">StoryBali Cht</h2>
            <div class="flex gap-6 text-gray-400">
                <i class="fa-solid fa-camera cursor-pointer hover:text-white"></i>
                <i class="fa-solid fa-magnifying-glass cursor-pointer hover:text-white"></i>
                <i class="fa-solid fa-ellipsis-vertical cursor-pointer hover:text-white"></i>
            </div>
        </header>

        <!-- Content Area -->
        <main id="main-content" class="flex-grow overflow-y-auto pb-24">
            <!-- VIEW: CHATS -->
            <div id="view-chats" class="divide-y divide-white/5"></div>

            <!-- VIEW: CONTACTS -->
            <div id="view-contacts" class="hide p-4">
                <div class="flex gap-2 mb-6">
                    <input id="friend-id-input" type="text" placeholder="Masukkan ID Teman..." class="bg-[#202c33] flex-grow p-4 rounded-2xl outline-none border border-white/5">
                    <button onclick="addContact()" class="bg-[#00a884] px-6 rounded-2xl font-bold">TAMBAH</button>
                </div>
                <div id="contact-list" class="space-y-2"></div>
            </div>

            <!-- VIEW: PROFILE -->
            <div id="view-profile" class="hide p-8 flex flex-col items-center">
                <div class="relative mb-6">
                    <img id="p-avatar" src="" class="w-32 h-32 rounded-full object-cover border-4 border-[#202c33]">
                    <label class="absolute bottom-0 right-0 bg-[#00a884] p-3 rounded-full cursor-pointer shadow-lg border-4 border-[#0b141a]">
                        <i class="fa-solid fa-pencil text-white text-xs"></i>
                        <input type="file" class="hidden" onchange="changeAvatar(this)">
                    </label>
                </div>
                <div class="w-full space-y-4">
                    <div class="bg-[#202c33] p-5 rounded-2xl">
                        <p class="text-[10px] text-[#00a884] font-bold uppercase mb-1">Nama Tampilan</p>
                        <input id="p-name" type="text" class="bg-transparent w-full font-bold outline-none">
                    </div>
                    <div class="bg-[#202c33] p-5 rounded-2xl">
                        <p class="text-[10px] text-[#00a884] font-bold uppercase mb-1">ID Unik Anda (Bagikan ini)</p>
                        <p id="p-myid" class="font-mono text-gray-400"></p>
                    </div>
                    <button onclick="saveProfile()" class="w-full bg-[#00a884] py-5 rounded-2xl font-bold shadow-xl">SIMPAN PROFIL</button>
                    <button onclick="logout()" class="w-full text-rose-500 font-bold py-2">Logout & Hapus Semua Data</button>
                </div>
            </div>
        </main>

        <!-- Bottom Nav -->
        <nav class="fixed bottom-0 w-full h-20 bg-[#202c33] border-t border-white/5 flex justify-around items-center px-4">
            <div onclick="switchPage('chats', this)" class="nav-item nav-active flex flex-col items-center cursor-pointer">
                <i class="fa-solid fa-message text-xl mb-1"></i>
                <span class="text-[10px] font-bold uppercase tracking-tighter">Chat</span>
            </div>
            <div onclick="switchPage('contacts', this)" class="nav-item flex flex-col items-center cursor-pointer text-gray-500">
                <i class="fa-solid fa-user-group text-xl mb-1"></i>
                <span class="text-[10px] font-bold uppercase tracking-tighter">Kontak</span>
            </div>
            <div onclick="switchPage('profile', this)" class="nav-item flex flex-col items-center cursor-pointer text-gray-500">
                <i class="fa-solid fa-circle-user text-xl mb-1"></i>
                <span class="text-[10px] font-bold uppercase tracking-tighter">Profil</span>
            </div>
        </nav>
    </div>

    <!-- CHAT ROOM WINDOW -->
    <div id="chat-room" class="fixed inset-0 bg-[#0b141a] z-[150] hide flex flex-col">
        <header class="h-16 bg-[#202c33] flex items-center px-4 gap-4 shadow-xl">
            <i class="fa-solid fa-arrow-left cursor-pointer" onclick="closeChat()"></i>
            <img id="cr-avatar" src="" class="w-10 h-10 rounded-full">
            <div class="flex-grow">
                <h3 id="cr-name" class="font-bold text-sm">Nama</h3>
                <p id="cr-status" class="text-[10px] text-gray-500 font-bold uppercase tracking-widest">Mencari Sinyal...</p>
            </div>
            <div class="flex gap-6 text-gray-400">
                <i class="fa-solid fa-phone cursor-pointer" onclick="call('voice')"></i>
                <i class="fa-solid fa-video cursor-pointer" onclick="call('video')"></i>
            </div>
        </header>
        <div id="cr-messages" class="flex-grow overflow-y-auto p-4 flex flex-col gap-3 bg-[url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded51.png')] bg-opacity-[0.03]"></div>
        <div class="p-3 bg-[#202c33] flex items-center gap-3">
            <label class="p-2 cursor-pointer text-gray-400 hover:text-white">
                <i class="fa-solid fa-paperclip text-xl"></i>
                <input type="file" class="hidden" accept="image/*" onchange="sendImg(this)">
            </label>
            <input id="cr-input" type="text" placeholder="Ketik pesan..." class="flex-grow bg-[#2a3942] p-3 rounded-2xl outline-none text-sm" oninput="sendTypingStatus()">
            <button onclick="sendMsg()" class="w-12 h-12 bg-[#00a884] rounded-full flex items-center justify-center shadow-lg"><i class="fa-solid fa-paper-plane text-xs"></i></button>
            <button id="btn-record" onclick="toggleRecording()" class="w-12 h-12 bg-[#2a3942] rounded-full flex items-center justify-center shadow-lg transition-colors">
                <i class="fa-solid fa-microphone text-white"></i>
            </button>
        </div>
    </div>

    <!-- CALL SCREEN OVERLAY -->
    <div id="call-screen" class="fixed inset-0 call-screen hide flex flex-col items-center justify-center">
        <video id="remoteVideo" autoplay playsinline></video>
        <video id="localVideo" autoplay playsinline muted></video>
        <div class="absolute top-24 text-center">
            <div id="call-avatar-big" class="w-24 h-24 rounded-full border-4 border-[#00a884] mx-auto mb-4 overflow-hidden">
                <img src="" class="w-full h-full object-cover">
            </div>
            <h2 id="call-name-display" class="text-2xl font-black mb-1 uppercase">Nama Teman</h2>
            <p id="call-status" class="text-[#00a884] font-bold tracking-[0.3em] animate-pulse">MEMANGGIL...</p>
        </div>
        <div class="absolute bottom-20 flex flex-col items-center gap-8">
            <button id="btn-switch-cam" onclick="switchCamera()" class="w-12 h-12 bg-white/10 rounded-full flex items-center justify-center backdrop-blur-md hide">
                <i class="fa-solid fa-camera-rotate text-white text-xl"></i>
            </button>
            <div class="flex gap-10">
            <button onclick="endCall()" class="w-20 h-20 bg-rose-600 rounded-full flex items-center justify-center shadow-2xl hover:bg-rose-500 active:scale-90 transition">
                <i class="fa-solid fa-phone-slash text-2xl rotate-[135deg]"></i>
            </button>
            <button id="btn-accept" class="w-20 h-20 bg-emerald-500 rounded-full flex items-center justify-center shadow-2xl hover:bg-emerald-400 active:scale-90 transition hide">
                <i class="fa-solid fa-phone text-2xl"></i>
            </button>
            </div>
        </div>
    </div>

    <script>
        // --- KONFIGURASI & STORAGE ---
        const PREFIX = "MESSENGER_PRO_V1_";
        let myId = localStorage.getItem('my_id') || "";
        let myProfile = JSON.parse(localStorage.getItem('my_profile')) || { name: "User Baru", avatar: "" };
        let allContacts = JSON.parse(localStorage.getItem('contacts')) || [];
        let chatHistory = JSON.parse(localStorage.getItem('history')) || {}; // { peerId: [{msg, side, time}] }

        let peer = null;
        let activeConn = null;
        let currentCall = null;
        let localStream = null;
        let currentChatPeer = null;
        let mediaRecorder = null;
        let audioChunks = [];
        let connections = {}; // Menyimpan semua koneksi aktif berdasarkan Peer ID
        let recordingStream = null;
        let isRecording = false;
        let currentFacingMode = 'user';
        let isCallAnswered = false;

        // --- CORE LOGIC ---
        function login() {
            const id = $('#my-id-input').val().trim().toLowerCase();
            if (id.length < 3) return alert("ID terlalu pendek");
            myId = id;
            localStorage.setItem('my_id', id);
            myProfile.name = id;
            localStorage.setItem('my_profile', JSON.stringify(myProfile));
            startApp();
        }

        function startApp() {
            unlockAudio(); // Penting untuk iOS
            $('#screen-login').addClass('hide');
            $('#main-app').removeClass('hide');
            $('#p-myid').text(myId);
            $('#p-name').val(myProfile.name);
            $('#p-avatar').attr('src', myProfile.avatar || 'https://ui-avatars.com/api/?name='+myId);
            
            requestInitialPermissions(); // Minta izin di awal sekali saja
            cleanOldMessages(); // Auto-delete 24 Jam
            initPeer();
            renderChatList();
            window.addEventListener('beforeunload', () => peer.destroy());
            setInterval(attemptFlushAllPending, 15000); // Cek pesan tertunda tiap 15 detik
            
            // Penanganan PWA iOS saat kembali dari layar kunci atau background
            document.addEventListener('visibilitychange', () => {
                if (document.visibilityState === 'visible') {
                    if (peer && peer.disconnected) {
                        peer.reconnect();
                    }
                }
            });
        }

        // iOS PWA Audio & Permission Fix
        function unlockAudio() {
            const notif = document.getElementById('notif-chat');
            const silentPlay = () => {
                notif.play().then(() => { notif.pause(); notif.currentTime = 0; });
                window.removeEventListener('click', silentPlay);
            };
            window.addEventListener('click', silentPlay);
        }

        function requestInitialPermissions() {
            navigator.mediaDevices.getUserMedia({ audio: true, video: true }).then(s => s.getTracks().forEach(t => t.stop())).catch(e => console.log("Permissions delayed"));
        }

        if (myId) { startApp(); }

        function initPeer() {
            peer = new Peer(PREFIX + myId);

            peer.on('connection', (conn) => {
                const senderId = conn.peer.replace(PREFIX, '');
                // Auto-Discovery: Tambahkan ke history jika belum ada
                if (!chatHistory[senderId]) chatHistory[senderId] = [];
                
                connections[senderId] = conn;

                conn.on('data', (data) => {
                    handleIncomingData(senderId, data);
                });
                
                conn.on('open', () => {
                    if (currentChatPeer === senderId) activeConn = conn;
                    resendPendingMessages(senderId, conn);
                });
            });

            peer.on('call', (call) => {
                const callerId = call.peer.replace(PREFIX, '');
                showIncomingCall(callerId, call);
            });

            peer.on('error', (err) => {
                if (err.type === 'peer-unavailable') {
                    $('#cr-status').text("OFFLINE").removeClass('text-[#00a884]').addClass('text-rose-500');
                } else {
                    console.error("PeerJS Error:", err.type);
                }
            });
        }

        // Fungsi untuk mengecek dan mengirim ulang pesan yang tertahan (pending)
        function attemptFlushAllPending() {
            Object.keys(chatHistory).forEach(pid => {
                const hasPending = chatHistory[pid].some(m => m.side === 'out' && m.status === 'pending');
                if (hasPending) {
                    // Jika sedang buka chat orang ini dan sudah online, kirim langsung
                    if (currentChatPeer === pid && activeConn && activeConn.open) {
                        resendPendingMessages(pid, activeConn);
                    } else {
                        // Coba hubungi di latar belakang untuk mengirim pesan
                        const tempConn = peer.connect(PREFIX + pid);
                        tempConn.on('open', () => {
                            resendPendingMessages(pid, tempConn);
                            setTimeout(() => tempConn.close(), 3000); // Tutup setelah terkirim
                        });
                    }
                }
            });
        }

        function resendPendingMessages(pid, connection) {
            if (!connection || !connection.open || !chatHistory[pid]) return;
            let changed = false;
            chatHistory[pid].forEach(m => {
                if (m.side === 'out' && m.status === 'pending') {
                    connection.send({ type: m.type, content: m.msg });
                    m.status = 'sent';
                    changed = true;
                }
            });
            if (changed) { saveHistory(); if (currentChatPeer === pid) renderMessages(); renderChatList(); }
        }

        // --- AUTO DELETE 24 JAM ---
        function cleanOldMessages() {
            const ONE_DAY = 24 * 60 * 60 * 1000;
            const now = Date.now();
            let changed = false;

            for (let peerId in chatHistory) {
                const originalLength = chatHistory[peerId].length;
                chatHistory[peerId] = chatHistory[peerId].filter(msg => (now - msg.time) < ONE_DAY);
                if (chatHistory[peerId].length !== originalLength) changed = true;
                if (chatHistory[peerId].length === 0) delete chatHistory[peerId];
            }

            if (changed) saveHistory();
        }

        // --- CHAT SYSTEM ---
        function handleIncomingData(senderId, data) {
            if (!data || !data.type) return;

            if (data.type === 'call-ended') {
                stopRingtone();
                endCall(false); // Tutup layar tanpa kirim sinyal balik
                return;
            }
            if (data.type === 'typing') {
                if (currentChatPeer === senderId) {
                    const conn = connections[senderId] || activeConn;
                    const defaultStatus = (conn && conn.open) ? "Online" : "Offline";
                    $('#cr-status').text(data.content ? "Sedang mengetik..." : defaultStatus);
                    if (data.content) {
                        setTimeout(() => { if(currentChatPeer === senderId) $('#cr-status').text("Online"); }, 3000);
                    }
                }
                return;
            }

            // Main Message Handling
            if (!chatHistory[senderId]) chatHistory[senderId] = [];
            
            // Pastikan audio notifikasi dipicu oleh interaksi user sebelumnya (unlockAudio)
            document.getElementById('notif-chat').play();
            
            chatHistory[senderId].push({
                msg: data.content,
                type: data.type,
                side: 'in',
                time: Date.now()
            });
            saveHistory();
            
            // Jika teman mengirim pesan ke kita, berarti dia Online. 
            // Coba balas dengan pesan pending kita jika ada.
            const conn = connections[senderId] || activeConn;
            if (conn && conn.open && conn.peer === PREFIX + senderId) {
                resendPendingMessages(senderId, conn);
            }

            renderChatList();
            if (currentChatPeer === senderId) renderMessages();
        }

        let typingTimeout;
        function sendTypingStatus() {
            if (!activeConn || !activeConn.open) return;
            activeConn.send({ type: 'typing', content: true });
            clearTimeout(typingTimeout);
            typingTimeout = setTimeout(() => {
                activeConn.send({ type: 'typing', content: false });
            }, 2000);
        }

        function sendMsg() {
            const val = $('#cr-input').val().trim();
            if (!val) return;

            const isOnline = activeConn && activeConn.open && activeConn.peer === PREFIX + currentChatPeer;
            if (isOnline) {
                activeConn.send({ type: 'text', content: val });
                activeConn.send({ type: 'typing', content: false });
            }
            
            pushToHistory(currentChatPeer, val, 'text', 'out', isOnline ? 'sent' : 'pending');
            $('#cr-input').val('');
        }

        // --- VOICE NOTE SYSTEM ---
        function toggleRecording() {
            if (!isRecording) {
                startRecording();
            } else {
                stopRecording();
            }
        }

        async function startRecording() {
            try {
                recordingStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(recordingStream);
                audioChunks = [];
                isRecording = true;
                
                $('#btn-record').addClass('bg-rose-600 animate-pulse');
                $('#btn-record i').removeClass('fa-microphone').addClass('fa-stop');

                mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
                mediaRecorder.onstop = () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        const base64Audio = reader.result;
                        const isOnline = activeConn && activeConn.open;
                        if (isOnline) {
                            activeConn.send({ type: 'voice', content: base64Audio });
                        }
                        pushToHistory(currentChatPeer, base64Audio, 'voice', 'out', isOnline ? 'sent' : 'pending');
                    };
                    reader.readAsDataURL(audioBlob);

                    // Matikan semua track hardware agar icon mic di iOS mati
                    if (recordingStream) {
                        recordingStream.getTracks().forEach(t => t.stop());
                        recordingStream = null;
                    }
                };
                mediaRecorder.start();
            } catch (err) { alert("Izin Mic ditolak"); }
        }

        function stopRecording() {
            if (mediaRecorder && mediaRecorder.state !== "inactive") {
                mediaRecorder.stop();
            }
            isRecording = false;
            $('#btn-record').removeClass('bg-rose-600 animate-pulse');
            $('#btn-record i').removeClass('fa-stop').addClass('fa-microphone');
        }

        function sendImg(input) {
            if (!input.files[0]) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const isOnline = activeConn && activeConn.open;
                if (isOnline) {
                    activeConn.send({ type: 'img', content: e.target.result });
                }
                pushToHistory(currentChatPeer, e.target.result, 'img', 'out', isOnline ? 'sent' : 'pending');
            };
            reader.readAsDataURL(input.files[0]);
        }

        function pushToHistory(peerId, content, type, side, status = 'sent') {
            if (!chatHistory[peerId]) chatHistory[peerId] = [];
            chatHistory[peerId].push({ msg: content, type: type, side: side, time: Date.now(), status: status });
            saveHistory();
            if (currentChatPeer === peerId) renderMessages();
            renderChatList();
        }

        function renderChatList() {
            const $list = $('#view-chats');
            $list.empty();
            
            Object.keys(chatHistory).reverse().forEach(pid => {
                const lastChat = chatHistory[pid][chatHistory[pid].length - 1];
                const time = new Date(lastChat.time).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                
                $list.append(`
                    <div onclick="openChat('${pid}')" class="flex items-center gap-4 p-4 hover:bg-[#202c33] cursor-pointer transition">
                        <img src="https://ui-avatars.com/api/?name=${pid}" class="w-14 h-14 rounded-full">
                        <div class="flex-grow">
                            <div class="flex justify-between items-center mb-1">
                                <h4 class="font-bold">${pid.toUpperCase()}</h4>
                                <span class="text-[10px] text-gray-500">${time}</span>
                            </div>
                            <p class="text-sm text-gray-500 truncate">${lastChat.type === 'img' ? '📷 Foto' : (lastChat.type === 'voice' ? '🎤 Pesan Suara' : (lastChat.type === 'missed-call' ? '📞 Panggilan Tak Terjawab' : lastChat.msg))}</p>
                        </div>
                    </div>
                `);
            });
        }

        function openChat(pid) {
            currentChatPeer = pid;
            $('#chat-room').removeClass('hide');
            $('#cr-name').text(pid.toUpperCase());
            $('#cr-avatar').attr('src', 'https://ui-avatars.com/api/?name='+pid);
            $('#cr-status').text("Menghubungkan...").removeClass('text-rose-500').addClass('text-gray-500');
            
            // Tutup koneksi lama jika ada
            if (activeConn) activeConn.close();

            // Mulai koneksi baru
            activeConn = peer.connect(PREFIX + pid);
            connections[pid] = activeConn;
            
            activeConn.on('open', () => {
                $('#cr-status').text("Online").addClass('text-[#00a884]').removeClass('text-gray-500 text-rose-500');
                resendPendingMessages(pid, activeConn);
            });

            activeConn.on('data', (data) => handleIncomingData(pid, data));
            
            activeConn.on('close', () => {
                $('#cr-status').text("Offline").removeClass('text-[#00a884]').addClass('text-gray-500');
            });

            renderMessages();
        }

        function renderMessages() {
            const $box = $('#cr-messages');
            $box.empty();
            if (!chatHistory[currentChatPeer]) return;

            chatHistory[currentChatPeer].forEach(m => {
                const time = new Date(m.time).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                const statusIcon = m.side === 'out' ? (m.status === 'pending' ? '<i class="fa-regular fa-clock text-[8px] ml-1"></i>' : '<i class="fa-solid fa-check-double text-[8px] ml-1 text-sky-400"></i>') : '';
                
                if (m.type === 'text') {
                    $box.append(`<div class="chat-${m.side} p-3 max-w-[85%] shadow-md">
                        <p class="text-sm">${m.msg}</p>
                        <p class="text-[9px] text-right opacity-50 mt-1">${time}${statusIcon}</p>
                    </div>`);
                } else if (m.type === 'img') {
                    $box.append(`<div class="chat-${m.side} p-1 max-w-[85%] shadow-md">
                        <img src="${m.msg}" class="rounded-lg max-h-60" onclick="window.open(this.src)">
                        <p class="text-[9px] text-right opacity-50 mt-1 mr-2 mb-1">${time}${statusIcon}</p>
                    </div>`);
                } else if (m.type === 'voice') {
                    $box.append(`<div class="chat-${m.side} p-3 max-w-[85%] shadow-md">
                        <audio controls class="h-8 w-48"> <source src="${m.msg}" type="audio/webm"> </audio>
                        <p class="text-[9px] text-right opacity-50 mt-1">${time}${statusIcon}</p>
                    </div>`);
                } else if (m.type === 'missed-call') {
                    $box.append(`<div class="self-center bg-black/20 text-[10px] px-4 py-1 rounded-full text-gray-400 uppercase tracking-widest my-2">
                        <i class="fa-solid fa-phone-slash mr-2"></i> ${m.msg} (${time})
                    </div>`);
                }
            });
            $box.scrollTop($box[0].scrollHeight);
        }

        // --- CALL SYSTEM ---
        function showIncomingCall(callerId, call) {
            isCallAnswered = false;
            const ring = document.getElementById('ringtone');
            ring.play().catch(() => console.log("User interaction needed for audio"));
            $('#call-screen').removeClass('hide');
            $('#btn-accept').removeClass('hide');
            $('#call-name-display').text(callerId);
            $('#call-avatar-big img').attr('src', 'https://ui-avatars.com/api/?name='+callerId);
            $('#call-status').text("PANGGILAN MASUK...");

            $('#btn-accept').off('click').on('click', () => {
                navigator.mediaDevices.getUserMedia({video: true, audio: true}).then(stream => {
                    stopRingtone();
                    localStream = stream;
                    $('#localVideo')[0].srcObject = stream;
                    call.answer(stream);
                    handleCall(call);
                    $('#btn-accept').addClass('hide');
                    $('#btn-switch-cam').removeClass('hide');
                });
            });
        }

        function stopRingtone() {
            const ring = document.getElementById('ringtone');
            ring.pause();
            ring.currentTime = 0;
        }

        async function call(type) {
            isCallAnswered = false;
            $('#call-screen').removeClass('hide');
            $('#call-name-display').text(currentChatPeer);
            $('#call-avatar-big img').attr('src', 'https://ui-avatars.com/api/?name='+currentChatPeer);
            
            // Hentikan stream lama jika masih ada untuk menghindari konflik hardware di iOS
            if (localStream) {
                localStream.getTracks().forEach(t => t.stop());
                localStream = null;
            }

            try {
                // Beri jeda 100ms agar sistem iOS siap setelah transisi layar
                await new Promise(r => setTimeout(r, 100));
                
                localStream = await navigator.mediaDevices.getUserMedia({
                    video: type === 'video' ? { facingMode: currentFacingMode } : false, 
                    audio: true
                });
                
                $('#localVideo')[0].srcObject = localStream;
                const callObj = peer.call(PREFIX + currentChatPeer, localStream);
                handleCall(callObj);
                if (type === 'video') $('#btn-switch-cam').removeClass('hide');
            } catch (e) { 
                console.error("Media Error:", e);
                alert("Kamera/Mic tidak dapat diakses. Jika Anda baru saja membuka layar, silakan coba tekan tombol panggil sekali lagi."); 
                endCall(); 
            }
        }

        async function switchCamera() {
            if (!localStream) return;
            currentFacingMode = currentFacingMode === 'user' ? 'environment' : 'user';
            
            const newStream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: currentFacingMode },
                audio: true
            });

            const videoTrack = newStream.getVideoTracks()[0];
            const sender = currentCall.peerConnection.getSenders().find(s => s.track.kind === 'video');
            if (sender) sender.replaceTrack(videoTrack);
            
            localStream.getVideoTracks()[0].stop();
            localStream = newStream;
            $('#localVideo')[0].srcObject = newStream;
        }

        function handleCall(callObj) {
            currentCall = callObj;
            callObj.on('stream', (remote) => {
                isCallAnswered = true;
                $('#remoteVideo').removeClass('hide');
                $('#remoteVideo')[0].srcObject = remote;
                $('#call-status').text("TERHUBUNG");
                $('#call-avatar-big').addClass('hide');
            });
            callObj.on('close', endCall);
        }

        function endCall(notifyPeer = true) {
            stopRingtone();
            if (notifyPeer && activeConn) {
                activeConn.send({ type: 'call-ended' });
            }
            
            if (!isCallAnswered && currentCall) {
                pushToHistory(currentChatPeer || currentCall.peer.replace(PREFIX, ''), "Panggilan Tak Terjawab", 'missed-call', 'in');
            }

            if (currentCall) currentCall.close();
            if (localStream) localStream.getTracks().forEach(t => t.stop());
            $('#call-screen').addClass('hide');
            $('#remoteVideo').addClass('hide')[0].srcObject = null;
            $('#call-avatar-big').removeClass('hide');
            $('#btn-switch-cam').addClass('hide');
        }

        // --- HELPERS ---
        function switchPage(page, btn) {
            if (isRecording) stopRecording();
            $('#view-chats, #view-contacts, #view-profile').addClass('hide');
            $('#view-' + page).removeClass('hide');
            $('.nav-item').removeClass('nav-active').addClass('text-gray-500');
            $(btn).addClass('nav-active').removeClass('text-gray-500');
            $('#page-title').text(page.toUpperCase());
        }

        function addContact() {
            const id = $('#friend-id-input').val().trim().toLowerCase();
            if (!id || id === myId) return;
            // Kontak di aplikasi ini hanyalah cara cepat membuka chat
            openChat(id);
            $('#friend-id-input').val('');
        }

        function closeChat() { 
            if (isRecording) stopRecording();
            $('#chat-room').addClass('hide'); 
            currentChatPeer = null; 
        }
        function saveHistory() { localStorage.setItem('history', JSON.stringify(chatHistory)); }
        function saveProfile() { 
            myProfile.name = $('#p-name').val();
            localStorage.setItem('my_profile', JSON.stringify(myProfile));
            alert("Profil Disimpan!");
        }
        function changeAvatar(input) {
            const reader = new FileReader();
            reader.onload = (e) => {
                myProfile.avatar = e.target.result;
                $('#p-avatar').attr('src', e.target.result);
            };
            reader.readAsDataURL(input.files[0]);
        }
        function logout() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
