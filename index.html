<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2P Messenger - Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0b141a;
            color: #e9edef;
        }
        .whatsapp-gradient { background: linear-gradient(to bottom, #00a884 0%, #008069 100%); }
        .chat-bg { background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded51.png'); background-opacity: 0.05; }
        
        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #374151; border-radius: 10px; }

        .message-in { background-color: #202c33; border-radius: 0 8px 8px 8px; align-self: flex-start; }
        .message-out { background-color: #005c4b; border-radius: 8px 0 8px 8px; align-self: flex-end; }
        
        #videoOverlay { background: rgba(0, 0, 0, 0.9); z-index: 100; display: none; }
        #remoteVideo { width: 100%; height: 100%; object-fit: cover; }
        #localVideo { width: 120px; height: 160px; object-fit: cover; position: absolute; top: 20px; right: 20px; border-radius: 12px; border: 2px solid #00a884; }
        
        input, button { outline: none !important; }
        .animate-pop { animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes pop { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body class="h-screen overflow-hidden flex items-center justify-center p-0 sm:p-4">

    <!-- Login Overlay -->
    <div id="loginOverlay" class="fixed inset-0 z-[200] bg-[#0b141a] flex items-center justify-center p-6">
        <div class="max-w-md w-full space-y-8 text-center animate-pop">
            <div class="w-20 h-20 whatsapp-gradient rounded-full flex items-center justify-center mx-auto shadow-2xl">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" />
                </svg>
            </div>
            <div class="space-y-2">
                <h1 class="text-3xl font-bold text-white uppercase tracking-tight">P2P Messenger</h1>
                <p class="text-[#8696a0] text-sm">Gunakan nama unik untuk login</p>
            </div>
            <div class="bg-[#202c33] p-8 rounded-3xl shadow-xl space-y-4">
                <input id="usernameInput" type="text" placeholder="Masukkan Nama Anda..." class="w-full bg-[#2a3942] p-4 rounded-xl text-center text-white font-medium border border-transparent focus:border-[#00a884] transition-all">
                <button onclick="login()" class="w-full whatsapp-gradient p-4 rounded-xl text-white font-bold tracking-widest hover:opacity-90 transition-all active:scale-95">MULAI CHATTING</button>
            </div>
        </div>
    </div>

    <!-- Main App Container -->
    <div class="flex w-full h-full max-w-[1600px] max-h-[900px] bg-[#111b21] shadow-2xl overflow-hidden sm:rounded-lg">
        
        <!-- Sidebar (Contacts/Info) -->
        <div id="sidebar" class="w-full sm:w-[350px] lg:w-[450px] border-r border-[#222d34] flex flex-col bg-[#111b21]">
            <!-- Sidebar Header -->
            <div class="h-[60px] bg-[#202c33] px-4 flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div id="myAvatar" class="w-10 h-10 rounded-full bg-indigo-600 flex items-center justify-center font-bold text-white uppercase shadow-md">U</div>
                    <div class="text-sm font-medium" id="myNameDisplay">Username</div>
                </div>
                <div class="flex gap-4 text-[#aebac1]">
                    <button onclick="location.reload()" title="Logout">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" /></svg>
                    </button>
                </div>
            </div>

            <!-- Search/Connect -->
            <div class="p-3">
                <div class="bg-[#202c33] rounded-xl flex items-center px-4 py-2 gap-4 border-b-2 border-transparent focus-within:border-[#00a884] transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-[#8696a0]" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
                    <input id="peerIdInput" type="text" placeholder="Masukkan ID Teman..." class="bg-transparent w-full text-sm py-1 focus:outline-none text-white">
                    <button onclick="connectToFriend()" class="text-[#00a884] font-bold text-xs uppercase hover:underline">Connect</button>
                </div>
            </div>

            <!-- Chat List -->
            <div class="flex-grow overflow-y-auto">
                <div class="p-4 text-xs font-bold text-[#00a884] uppercase tracking-widest opacity-60">Status Koneksi</div>
                <div id="connectionStatus" class="px-4 py-3 flex items-center gap-4 hover:bg-[#202c33] cursor-pointer transition">
                    <div class="w-12 h-12 rounded-full bg-slate-700 flex items-center justify-center font-bold text-xl" id="targetAvatar">?</div>
                    <div class="flex-grow border-b border-[#222d34] pb-3">
                        <div class="flex justify-between items-center mb-1">
                            <span class="font-medium text-[#e9edef]" id="targetName">Belum Terhubung</span>
                            <span class="text-[10px] text-[#8696a0]" id="lastSeen">--:--</span>
                        </div>
                        <div class="text-sm text-[#8696a0] truncate" id="connectionInfo">Masukkan ID teman untuk memulai P2P</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Chat Area -->
        <div id="chatArea" class="flex-grow flex flex-col bg-[#0b141a] relative">
            <!-- Chat Header -->
            <div class="h-[60px] bg-[#202c33] px-4 flex justify-between items-center z-10 shadow-md">
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 rounded-full bg-slate-600 flex items-center justify-center font-bold" id="headerAvatar">?</div>
                    <div>
                        <div class="font-medium text-white" id="headerName">Messenger</div>
                        <div class="text-[11px] text-[#8696a0]" id="headerStatus">P2P Encrypted</div>
                    </div>
                </div>
                <div class="flex gap-6 text-[#aebac1]">
                    <button onclick="startCall('voice')" class="hover:text-white transition active:scale-90 disabled:opacity-30" id="voiceCallBtn" disabled>
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" /></svg>
                    </button>
                    <button onclick="startCall('video')" class="hover:text-white transition active:scale-90 disabled:opacity-30" id="videoCallBtn" disabled>
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z" /></svg>
                    </button>
                </div>
            </div>

            <!-- Messages Box -->
            <div id="messagesContainer" class="flex-grow p-4 overflow-y-auto flex flex-col gap-2 chat-bg relative">
                <div class="sticky top-0 z-10 flex justify-center mb-4">
                    <span class="bg-[#182229] text-[11px] text-[#8696a0] px-3 py-1 rounded-lg uppercase tracking-widest border border-white/5">Hanya Anda dan teman yang bisa membaca chat ini</span>
                </div>
            </div>

            <!-- Input Area -->
            <div class="bg-[#202c33] p-3 flex items-center gap-3">
                <button class="text-[#8696a0] hover:text-white">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.828 14.828a4 4 0 01-5.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                </button>
                <button class="text-[#8696a0] hover:text-white">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13" /></svg>
                </button>
                <form id="chatForm" onsubmit="sendMessage(event)" class="flex-grow">
                    <input id="messageInput" type="text" placeholder="Ketik pesan..." class="w-full bg-[#2a3942] py-2.5 px-4 rounded-xl text-sm text-white focus:outline-none placeholder-[#8696a0]">
                </form>
                <button onclick="document.getElementById('chatForm').requestSubmit()" class="text-[#8696a0] hover:text-[#00a884] transition active:scale-90">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="currentColor" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                </button>
            </div>
        </div>
    </div>

    <!-- Fullscreen Video Overlay -->
    <div id="videoOverlay" class="fixed inset-0 flex flex-col items-center justify-center p-4">
        <div class="relative w-full max-w-4xl aspect-video rounded-3xl overflow-hidden shadow-2xl bg-black border border-white/10">
            <video id="remoteVideo" autoplay playsinline></video>
            <video id="localVideo" autoplay playsinline muted></video>
            
            <!-- Controls Overlay -->
            <div class="absolute bottom-10 left-0 right-0 flex justify-center gap-8 items-center">
                <button onclick="endCall()" class="w-16 h-16 bg-rose-600 rounded-full flex items-center justify-center shadow-xl hover:bg-rose-500 transition active:scale-90">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-white rotate-[135deg]" fill="currentColor" viewBox="0 0 24 24"><path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg>
                </button>
            </div>
            
            <div class="absolute top-10 left-10 flex items-center gap-3">
                <div class="whatsapp-gradient px-4 py-1.5 rounded-full text-xs font-bold tracking-widest uppercase shadow-lg">Live P2P</div>
                <span id="callPartnerName" class="text-xl font-bold text-white drop-shadow-lg">Teman</span>
            </div>
        </div>
    </div>

    <script>
        const APP_PREFIX = "messenger-p2p-";
        let myUsername = localStorage.getItem('messenger_username') || "";
        let peer = null;
        let conn = null;
        let localStream = null;
        let currentCall = null;

        // 1. Logic Login
        function login() {
            const name = $('#usernameInput').val().trim().toLowerCase();
            if (name.length < 3) return alert("Nama minimal 3 karakter!");
            
            myUsername = name;
            localStorage.setItem('messenger_username', myUsername);
            initPeer();
            $('#loginOverlay').fadeOut();
        }

        if (myUsername) {
            $('#loginOverlay').hide();
            initPeer();
        }

        // 2. PeerJS Core
        function initPeer() {
            peer = new Peer(APP_PREFIX + myUsername);

            peer.on('open', (id) => {
                console.log("My Peer ID: " + id);
                $('#myNameDisplay').text(myUsername.toUpperCase());
                $('#myAvatar').text(myUsername[0].toUpperCase());
            });

            peer.on('error', (err) => {
                if (err.type === 'unavailable-id') {
                    alert("Nama sudah dipakai! Pilih nama lain.");
                    localStorage.removeItem('messenger_username');
                    location.reload();
                }
            });

            // Menangani Koneksi Chat Masuk
            peer.on('connection', (c) => {
                if (conn) conn.close();
                conn = c;
                setupConnListeners();
                updateUIConnected(conn.peer.replace(APP_PREFIX, ''));
            });

            // Menangani Panggilan Masuk (Voice/Video)
            peer.on('call', (call) => {
                if (confirm("Ada panggilan masuk dari " + call.peer.replace(APP_PREFIX, '').toUpperCase() + ". Terima?")) {
                    navigator.mediaDevices.getUserMedia({ video: true, audio: true }).then((stream) => {
                        localStream = stream;
                        call.answer(stream);
                        handleCall(call);
                    });
                }
            });
        }

        // 3. Functions Outgoing
        function connectToFriend() {
            const target = $('#peerIdInput').val().trim().toLowerCase();
            if (!target || target === myUsername) return alert("ID Tidak Valid!");

            if (conn) conn.close();
            conn = peer.connect(APP_PREFIX + target);
            setupConnListeners();
            updateUIConnected(target);
        }

        function setupConnListeners() {
            conn.on('open', () => {
                $('#connectionInfo').text("Terhubung - Siap Chatting");
                $('#voiceCallBtn, #videoCallBtn').prop('disabled', false);
                const targetName = conn.peer.replace(APP_PREFIX, '').toUpperCase();
                $('#targetName, #headerName, #callPartnerName').text(targetName);
                $('#targetAvatar, #headerAvatar').text(targetName[0]).addClass('bg-emerald-600');
                $('#lastSeen').text(new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}));
            });

            conn.on('data', (data) => {
                if (data.type === 'text') {
                    appendMessage(data.content, 'in');
                }
            });

            conn.on('close', () => {
                $('#connectionInfo').text("Koneksi Terputus");
                $('#voiceCallBtn, #videoCallBtn').prop('disabled', true);
            });
        }

        function sendMessage(e) {
            e.preventDefault();
            const msg = $('#messageInput').val().trim();
            if (!msg || !conn) return;

            conn.send({ type: 'text', content: msg });
            appendMessage(msg, 'out');
            $('#messageInput').val('');
        }

        function appendMessage(text, side) {
            const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            const msgHtml = `
                <div class="message-${side} max-w-[85%] p-2 px-3 shadow-sm flex flex-col animate-pop">
                    <span class="text-sm text-white">${text}</span>
                    <span class="text-[9px] text-[#8696a0] self-end mt-1">${time}</span>
                </div>
            `;
            $('#messagesContainer').append(msgHtml);
            $('#messagesContainer').scrollTop($('#messagesContainer')[0].scrollHeight);
        }

        // 4. Voice & Video Call Logic
        async function startCall(type) {
            if (!conn) return;
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: type === 'video', 
                    audio: true 
                });
                localStream = stream;
                $('#localVideo')[0].srcObject = stream;
                
                const call = peer.call(conn.peer, stream);
                handleCall(call);
            } catch (err) {
                alert("Izin Kamera/Mikrofon ditolak!");
            }
        }

        function handleCall(call) {
            currentCall = call;
            $('#videoOverlay').fadeIn().css('display', 'flex');
            
            call.on('stream', (remoteStream) => {
                $('#remoteVideo')[0].srcObject = remoteStream;
            });

            call.on('close', () => {
                endCall();
            });
        }

        function endCall() {
            if (currentCall) currentCall.close();
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
            }
            $('#videoOverlay').fadeOut();
            $('#remoteVideo')[0].srcObject = null;
            $('#localVideo')[0].srcObject = null;
        }

        function updateUIConnected(target) {
            $('#peerIdInput').val('');
            $('#targetName, #headerName').text(target.toUpperCase());
            $('#targetAvatar, #headerAvatar').text(target[0].toUpperCase());
        }
    </script>
</body>
</html>
